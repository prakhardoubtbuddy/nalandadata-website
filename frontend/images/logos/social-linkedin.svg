<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- LinkedIn profile photo: 400×400, mark centered in circle-safe zone -->
  <rect width="400" height="400" fill="#0D0D0D"/>
  <!-- Ascending Steps Mark — centered, scale ~3.9 on viewBox 32×28 -->
