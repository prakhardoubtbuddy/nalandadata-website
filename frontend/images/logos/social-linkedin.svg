  <!-- Mark centered: top-left at (200-62, 200-55) = (138, 145) -->
  <!-- Base bar: x=138+0 y=145+74 w=125 h=35 -->
  <rect x="138" y="219" width="125" height="35" fill="#C8A96E"/>
  <!-- Middle bar: x=138+39 y=145+39 w=86 h=27 -->
  <rect x="177" y="184" width="86" height="27" fill="#C8A96E"/>
  <!-- Top bar: x=138+78 y=145+0 w=47 h=31 -->
  <rect x="216" y="145" width="47" height="31" fill="#C8A96E"/>
</svg>
