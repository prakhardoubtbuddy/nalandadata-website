<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- YouTube channel icon: 800×800, mark centered -->
  <rect width="800" height="800" fill="#0D0D0D"/>
  <!-- Ascending Steps Mark — scaled to ~250×218, centered at 400,400 -->
  <!-- Scale factor: 250/32 = 7.8125 on viewBox 32×28 (total h=218.75) -->
  <!-- Center: mark left-x = 400-125=275, top-y = 400-109=291 -->
  <!-- Base: x=275+0 y=291+148 w=250 h=70 -->
  <rect x="275" y="439" width="250" height="70" fill="#C8A96E"/>
  <!-- Middle: x=275+78 y=291+78 w=172 h=55 -->
  <rect x="353" y="369" width="172" height="55" fill="#C8A96E"/>
  <!-- Top: x=275+156 y=291+0 w=94 h=62 -->
  <rect x="431" y="291" width="94" height="62" fill="#C8A96E"/>
</svg>
